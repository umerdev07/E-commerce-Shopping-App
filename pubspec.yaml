name: e_commerce
description: "A new Flutter project."


publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.10.4

#-------------- Packages ----------------------
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  #  Utilities
  flutter_native_splash: ^2.4.7
  lottie: ^3.3.2
  smooth_page_indicator: ^2.0.1
  iconsax_flutter: ^1.0.1
  carousel_slider: ^5.1.1
  readmore: ^3.0.0
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  crypto: ^3.0.7
  path_provider: ^2.1.5

  # Network
  connectivity_plus: ^7.0.0
  dio: ^5.9.1
  cached_network_image: ^3.4.1

    # State Management
  get: ^4.7.3
  get_storage: ^2.1.1


  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: ^6.3.0
# -----------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # -------------- Assets --------------------------
  assets:
    - assets/logo/
    - assets/brands/
    - assets/images/
    - assets/banners/
    - assets/products/
    - assets/animations/
    - assets/icons/categories/
    - assets/icons/payments_methods/



  # -------------- Fonts --------------------------
  fonts:
    - family: 'Nunito'
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500




